name: C2SSM_uhdlol
model_type: FeMaSRModel 
scale: &upscale 1
num_gpu: 2 # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: General_Image_Train
    type: PairedImageDataset

    dataroot_gt: datasets/lol4k/train/high
    dataroot_lq: datasets/lol4k/train/low

    io_backend:
      type: disk
    
    # gt_size: 512
    gt_size: 768
    use_resize_crop: True
    use_flip: True
    use_rot: True

    # data loader
    use_shuffle: True
    geometric_augs: True
    batch_size_per_gpu: &bsz 4
    num_worker_per_gpu: 8
    dataset_enlarge_ratio: 1

    prefetch_mode: cpu 
    # prefetch_mode: cuda
    pin_memory: true
    # Change
    num_prefetch_queue: *bsz

  val:
    name: General_Image_Valid
    type: PairedImageDataset
    
    dataroot_gt: datasets/lol4k/test/high
    dataroot_lq: datasets/lol4k/test/low

    gt_size: 768
    io_backend:
      type: disk
    geometric_augs: True
    use_resize_crop: False
    use_flip: False
    use_rot: False


network_g:
  type: C2SSM
  input_dim: 3
  output_dim: 3
  feature_dim: 32
  proposal_hw: [2, 2, 2]
  fold_hw: [4, 2, 1]
  heads: [1, 2, 4]
  num_blocks: [2, 4, 4]
  ffn_expansion_factor: 2.66
# network_d:
#   type: UNetDiscriminatorSN
#   num_in_ch: 3


path:
  pretrain_network_hq: ~
  pretrain_network_g: ~ 
  pretrain_network_d: ~
  strict_load: true
  resume_state: ~



train:
  optim_g:
    type: AdamW
    lr: !!float 5e-4 
    weight_decay: !!float 1e-3
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 4e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartCyclicLR 
    periods: [100, 150000]
    # periods: [100, 199900]
    restart_weights: [1, 1]
    eta_mins: [0.0005, 0.0000001]

  total_iter: 150100

  # total_iter: 200000

  warmup_iter: -1  # no warm up

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0 
    reduction: mean
  pixel_ssim_opt:
    loss_weight: !!float 0.25

  fft_opt:
    type: FFTLoss
    loss_weight: !!float 0.1


  # perceptual_opt:
  #   type: LPIPSLoss
  #   loss_weight: !!float 0
    
  # gan_opt:
  #   type: GANLoss
  #   gan_type: hinge
  #   real_label_val: 1.0
  #   fake_label_val: 0.0
  #   loss_weight: 0

  # codebook_opt:
  #   loss_weight: 0
  
  # semantic_opt:
  #   loss_weight: 0

  # net_d_iters: 0
  # net_d_init_iters: !!float 0 

val:
  val_freq: !!float 20000 
  save_img: true

  key_metric: psnr
  metrics:
    psnr: 
      type: psnr 
      crop_border: 0
      test_y_channel: false
    ssim:
      type: ssim 
      crop_border: 0
      test_y_channel: false
    lpips:
      type: lpips 
      better: lower

# logging settings
logger:
  print_freq: 10
  save_checkpoint_freq: !!float 5000
  save_latest_freq: !!float 1e4
  show_tf_imgs_freq: !!float 5000
  use_tb_logger: true

wandb:
    project: C2SSM
    resume_id: ~

dist_params:
  backend: nccl
  port: 16500 #29500
find_unused_parameters: true
